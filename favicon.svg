<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="toothFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>

  <!-- Molar tooth — crown + two roots -->
  <path fill="url(#toothFill)"
    d="M32 8
       C27 8 21 10 17 15
       C13 20 13 27 16 32
       C13 35 11 40 13 46
       C15 52 20 56 24 56
       C27 56 28 52 29 48
       C30 44 30 41 32 41
       C34 41 34 44 35 48
       C36 52 37 56 40 56
       C44 56 49 52 51 46
       C53 40 51 35 48 32
       C51 27 51 20 47 15
       C43 10 37 8 32 8Z"/>

  <!-- Crown top highlight — suggests two cusps -->
  <path fill="#bfdbfe" opacity="0.55"
    d="M32 11
       C28 11 24 13 22 17
       C20 21 21 24 23 24
       C25 21 28 18 32 17
       C36 18 39 21 41 24
       C43 24 44 21 42 17
       C40 13 36 11 32 11Z"/>

  <!-- Thin groove line between roots -->
  <line x1="32" y1="41" x2="32" y2="50"
        stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
